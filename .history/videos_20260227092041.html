<!-- Compartilhar video -->
<script>
  // Adicionando evento de clique ao botão de compartilhamento
  document.getElementById("sharevideos").addEventListener("click", function () {
    // Verifica se o navegador suporta a API do Web Share
    if (navigator.share) {
      // Chama a API do Web Share
      navigator.share({
        title: "Mastro D'Ascia Náutica",
        text: 'Galeria de Vídeos',
        url: 'https://mastrodascia.com.br/videos'
      }).then(() => {
        console.log('Conteúdo compartilhado com sucesso!');
      }).catch((error) => {
        console.error('Erro ao compartilhar:', error);
      });
    } else {
      // Caso o navegador não suporte, mostra uma mensagem alternativa
      alert("Desculpe, seu navegador não suporta o compartilhamento.");
    }
  });

  // Inicializa GLightbox para vídeos
  const lightboxVideos = GLightbox({
    selector: '.glightbox[data-gallery="videos"]'
  });
</script>
